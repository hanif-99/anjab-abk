<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - e-ANJAB & e-ABK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.25);
            padding: 50px;
            max-width: 420px;
            width: 100%;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .app-logo {
            font-size: 48px;
            margin-bottom: 15px;
            color: #667eea;
        }
        .login-header h2 {
            color: #2d3748;
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 28px;
        }
        .login-header p {
            color: #a0aec0;
            font-size: 14px;
        }
        .form-label {
            color: #2d3748;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            padding: 12px 15px;
            font-size: 14px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 6px;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn-login:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        .demo-credentials {
            background: #f7fafc;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 20px;
        }
        .demo-credentials code {
            background: #edf2f7;
            padding: 2px 6px;
            border-radius: 3px;
            color: #c53030;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-header">
                <div class="app-logo">
                    <i class="bi bi-briefcase-fill"></i>
                </div>
                <h2>e-ANJAB & e-ABK</h2>
                <p>Analisis Jabatan & Beban Kerja Elektronik</p>
            </div>

            <form method="POST" action="/login">
                <div class="mb-3">
                    <label for="email" class="form-label">
                        <i class="bi bi-envelope"></i> Email
                    </label>
                    <input type="email" class="form-control" id="email" name="email" 
                           placeholder="admin@anjab.local" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock"></i> Password
                    </label>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>

            <div class="demo-credentials">
                <strong>📋 Demo Credentials:</strong><br>
                Email: <code>admin@anjab.local</code><br>
                Password: <code>password</code><br><br>
                Atau gunakan: <code>ortala, kementerian, skpd, rumahsakit, perguruantinggi, blu</code><br>
                Semua password: <code>password</code>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
